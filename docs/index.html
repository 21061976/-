    // חישוב חומרת סיכון
    function calculateSeverity(input) {
      const row = input.closest('tr');
      const probability = parseInt(row.querySelector('.risk-probability').value) || 0;
      const impact = parseInt(row.querySelector('.risk-impact').value) || 0;
      const severity = probability * impact;
      
      row.querySelector('.risk-severity').textContent = severity;
      
      // הוספת סימון צבע לפי חומרה
      if (severity >= 15) {
        row.className = 'risk-high';
      } else if (severity >= 8) {
        row.className = 'risk-medium';
      } else {
        row.className = 'risk-low';
      }
    }
    
    // הוספת סיכון חדש
    function addRisk(tableId) {
      const tbody = document.getElementById(tableId);
      const newRow = document.createElement('tr');
      newRow.className = 'risk-low';
      
      newRow.innerHTML = `
        <td><input type="text" class="risk-description"></td>
        <td><input type="text" class="risk-impacts"></td>
        <td><input type="number" min="1" max="10" value="1" class="risk-probability" onchange="calculateSeverity(this)"></td>
        <td><input type="number" min="1" max="10" value="1" class="risk-impact" onchange="calculateSeverity(this)"></td>
        <td class="risk-severity">1</td>
        <td><button onclick="removeRisk(this)">הסר</button></td>
      `;
      
      tbody.appendChild(newRow);
    }
    
    // הסרת סיכון
    function removeRisk(button) {
      const row = button.closest('tr');
      row.parentNode.removeChild(row);
    }

    function saveRiskAssessment() {
      projectData.risks = [];

      collectRisksFromTable('content-risks', 'תוכן ותכנים');

      collectRisksFromTable('staff-risks', 'כשירות צוות');
      
      // איסוף סיכוני מקצוענות
      collectRisksFromTable('professionalism-risks', 'מקצוענות');
      
      // איסוף סיכוני ארגון ותכנון
      collectRisksFromTable('organization-risks', 'ארגון ותכנון');
      
      // איסוף סיכוני תשתיות
      collectRisksFromTable('infrastructure-risks', 'תשתיות');
      
      // איסוף סיכונים מותאמים

      projectData.riskStrategies = document.getElementById('risk-strategies').value;

    }
    
    // איסוף סיכונים מטבלה
    function collectRisksFromTable(tableId, category) {
      const rows = document.getElementById(tableId).querySelectorAll('tr');
      
      rows.forEach(row => {
        const description = row.querySelector('.risk-description').value;
        const impacts = row.querySelector('.risk-impacts').value;
        const probability = parseInt(row.querySelector('.risk-probability').value) || 0;
        const impact = parseInt(row.querySelector('.risk-impact').value) || 0;
        const severity = probability * impact;
        
        if (description) {
          projectData.risks.push({
            category,
            description,
            impacts,
            probability,
            impact,
            severity
          });
        }
      });
    }
    
    // בחירת דירוג חדשנות
    function selectRating(option, category, value) {
      // הסרת בחירה קודמת
      const parent = option.parentNode;
      const options = parent.querySelectorAll('.rating-option');
      options.forEach(opt => opt.classList.remove('selected'));
      
      // הוספת בחירה חדשה
      option.classList.add('selected');
      
      // שמירת הערך
      if (!projectData.innovation.ratings) {
        projectData.innovation.ratings = {};
      }
      
      projectData.innovation.ratings[category] = value;
    }
    
    // שמירת אסדרת חדשנות

      // שמירת הערות על חדשנות
      if (!projectData.innovation.notes) {
        projectData.innovation.notes = {};

      document.querySelectorAll('.innovation-notes').forEach(textarea => {

    // עדכון התקדמות

      // התקדמות פרטי הפרויקט
      updateProgressBar('project-details');
      
      // התקדמות ניתוח סיכונים

      updateProgressBar('innovation-assessment');

    // עדכון סרגל התקדמות
    function updateProgressBar(section) {
      let progress = 0;
      
      if (section === 'project-details') {
        const fields = ['project-name', 'project-manager', 'organization', 'project-date', 'project-desc', 'project-goals', 'project-innovation', 'target-audience', 'participants-number', 'work-plan', 'resources'];
        let filledFields = 0;
        
        fields.forEach(field => {
          if (document.getElementById(field).value) {
            filledFields++;
          }
        });
        
        progress = Math.round((filledFields / fields.length) * 100);
      } else if (section === 'risk-assessment') {
        if (projectData.risks.length > 0) {
          progress = Math.min(100, Math.round((projectData.risks.length / 5) * 100));
        }
        
        if (document.getElementById('risk-strategies').value) {
          progress = Math.min(100, progress + 20);
        }
      } else if (section === 'innovation-assessment') {
        let ratings = 0;
        const categories = ['fairness', 'transparency', 'authority', 'persistence', 'wellbeing', 'compliance'];
        
        if (projectData.innovation && projectData.innovation.ratings) {
          categories.forEach(category => {
            if (projectData.innovation.ratings[category]) {
              ratings++;
            }
          });
        }
        
        progress = Math.round((ratings / categories.length) * 60);
        
        if (document.getElementById('innovation-level').value) {
          progress += 20;
        }
        
        if (document.getElementById('innovation-justification').value) {
          progress += 10;
        }
        
        if (document.getElementById('ministry-guidelines').value) {
          progress += 10;
        }
      }
      
      document.getElementById(`${section}-progress`).style.width = `${progress}%`;
      document.getElementById(`${section}-progress-text`).textContent = `${progress}%`;
    }

        reportHTML += `
          <tr class="${riskClass}">
            <td>${risk.category}</td>
            <td>${risk.description}</td>
            <td>${risk.impacts}</td>
            <td>${risk.probability}</td>
            <td>${risk.impact}</td>
            <td>${risk.severity}</td>
          </tr>
        `;
      });
      
      reportHTML += `
            </tbody>
          </table>
          
          <h5>אסטרטגיות טיפול בסיכונים</h5>
          <p>${projectData.riskStrategies || ''}</p>
        </div>
        
        <div class="report-section">
          <h4>אסדרת חדשנות</h4>
      `;
      
      if (projectData.innovation && projectData.innovation.ratings) {
        reportHTML += `
          <h5>הערכת החדשנות</h5>
          <table>
        `;
        
        const categories = {
          fairness: 'הוגנות ונגישות',
          transparency: 'שקיפות',
          authority: 'סמכות ואחריות',
          persistence: 'התמדה',
          wellbeing: 'שלומות ומוגנות',
          compliance: 'כפיפות לנורמות המחייבות של המדינה'
        };
        
        const ratings = {
          1: 'נמוך',
          2: 'בינוני',
          3: 'גבוה'
        };
        
        Object.keys(categories).forEach(category => {
          const rating = projectData.innovation.ratings[category];
          const note = projectData.innovation.notes && projectData.innovation.notes[category] ? projectData.innovation.notes[category] : '';
          
          reportHTML += `
            <tr>
              <td>${categories[category]}</td>
              <td>${rating ? ratings[rating] : 'לא הוערך'}</td>
              <td>${note}</td>
            </tr>
          `;
        });
        
        reportHTML += `
          </table>
        `;
      }
      
      const innovationLevels = {
        base: 'רמת בסיס',
        high: 'רמת מומחיות גבוהה',
        'very-high': 'רמת מומחיות גבוהה מאוד'
      };
      
      reportHTML += `
          <h5>רמת החדשנות</h5>
          <p>${projectData.innovation && projectData.innovation.level ? innovationLevels[projectData.innovation.level] : 'לא צוין'}</p>
          
          <h5>נימוק לבחירת רמת החדשנות</h5>
          <p>${projectData.innovation && projectData.innovation.justification ? projectData.innovation.justification : ''}</p>
          
          <h5>התאמה לחוזר מנכ"ל לאסדרת חדשנות</h5>
          <p>${projectData.innovation && projectData.innovation.ministryGuidelines ? projectData.innovation.ministryGuidelines : ''}</p>
        </div>
        
        <div class="report-section">
          <h4>סיכום והמלצות</h4>
          <p>הפרויקט "${projectData.basicInfo.name || ''}" הוערך מבחינת ניהול סיכונים ואסדרת חדשנות. להלן המלצות עיקריות:</p>
          <ul>
      `;
      
      // המלצות אוטומטיות בהתאם לניתוח
      if (sortedRisks.length > 0 && sortedRisks[0].severity >= 15) {
        reportHTML += `<li>מומלץ לפתח תוכנית התמודדות מפורטת עם סיכונים בעלי חומרה גבוהה, במיוחד בתחום ${sortedRisks[0].category}.</li>`;
      }
      
      if (projectData.innovation && projectData.innovation.level === 'high' || projectData.innovation.level === 'very-high') {
        reportHTML += `<li>לאור רמת החדשנות הגבוהה, מומלץ לבצע פיילוט מצומצם ומבוקר לפני יישום מלא.</li>`;
      }
      
      reportHTML += `
          <li>מומלץ לקיים מעקב תקופתי אחר הסיכונים המזוהים ולעדכן את תוכנית ניהול הסיכונים בהתאם להתפתחויות.</li>
          <li>מומלץ לשתף את כל בעלי העניין בתוכנית ניהול הסיכונים ולהגביר את השקיפות בנושא.</li>
        </ul>
        </div>
      `;
      
      reportContent.innerHTML = reportHTML;
    }
    
    // הדפסת הדוח
    function printReport() {
      window.print();
    }
    
    // ייצוא ל-PDF
    function exportPDF() {
      alert('פונקציונליות ייצוא ל-PDF תתווסף בעתיד');
      // במימוש מלא יש להשתמש בספריה כמו jsPDF
    }
    
    // ייצוא ל-CSV
    function exportCSV() {
      // יצירת CSV לסיכונים
      let csv = 'קטגוריה,תיאור הסיכון,השלכות,הסתברות,נזק צפוי,חומרה\n';
      
      projectData.risks.forEach(risk => {
        csv += `"${risk.category}","${risk.description}","${risk.impacts}",${risk.probability},${risk.impact},${risk.severity}\n`;
      });
      
      // יצירת הקובץ והורדתו
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      
      link.setAttribute('href', url);
      link.setAttribute('download', `${projectData.basicInfo.name || 'project'}_risks.csv`);
      link.style.visibility = 'hidden';
      
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
    
    // עדכון התקדמות בטעינת העמוד
    updateProgress();
  </script>
</body>
</html>
